<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>A Quest For Love</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
    <!-- Title Screen -->
    <section id="stage-title" class="stage active" data-portrait="images/portrait/intro.jpg">
        <!-- Tap-to-start overlay for AudioContext -->
        <div class="audio-waiting-overlay" id="audio-waiting">
            <p class="audio-waiting-text">Tap anywhere to begin</p>
        </div>
        <div class="ambient-particles" aria-hidden="true"></div>
        <div class="title-content">
            <div class="title-clouds" aria-hidden="true">
                <div class="cloud cloud-1"></div>
                <div class="cloud cloud-2"></div>
                <div class="cloud cloud-3"></div>
            </div>
            <div class="title-group">
                <h1 class="title-text">A Quest For Love</h1>
                <p class="title-subtitle">Will you embark on this adventure?</p>
            </div>
            <button class="btn-primary" id="btn-start">Begin Adventure</button>
        </div>
    </section>

    <!-- Stage 1: Movie Night -->
    <section id="stage-1" class="stage" style="background-image: url('images/stage1.jpg');" data-portrait="images/portrait/stage1.jpg">
        <div class="spotlight-overlay" aria-hidden="true"></div>
        <div class="progress-dots" aria-hidden="true">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
        <div class="stage-content">
            <div class="dialogue-box">
                <h2 class="stage-title-text" id="stage-1-title"></h2>
                <div class="clue-wrapper">
                    <p class="clue-text" id="stage-1-clue"></p>
                </div>
                <div class="input-row">
                    <input type="text" class="stage-input" id="input-1" placeholder="Enter your answer.." autocomplete="off" aria-label="Answer input for stage 1">
                    <button class="btn-check" data-stage="1" aria-label="Check answer">
                        <svg class="checkmark-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button class="clue-toggle clue-toggle-1" aria-label="Toggle clue visibility" aria-expanded="true" data-clue="stage-1-clue">
                <span class="toggle-icon">▼</span>
            </button>
        </div>
    </section>

    <!-- Stage 2: First Kiss -->
    <section id="stage-2" class="stage" style="background-image: url('images/stage2.jpg');" data-portrait="images/portrait/stage2.jpg">
        <div class="progress-dots" aria-hidden="true">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
        <div class="stage-content">
            <div class="dialogue-box">
                <h2 class="stage-title-text" id="stage-2-title"></h2>
                <div class="clue-wrapper">
                    <p class="clue-text" id="stage-2-clue"></p>
                </div>
                <div class="input-row">
                    <input type="text" class="stage-input" id="input-2" placeholder="Enter your answer.." autocomplete="off" aria-label="Answer input for stage 2">
                    <button class="btn-check" data-stage="2" aria-label="Check answer">
                        <svg class="checkmark-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button class="clue-toggle clue-toggle-2" aria-label="Toggle clue visibility" aria-expanded="true" data-clue="stage-2-clue">
                <span class="toggle-icon">▼</span>
            </button>
        </div>
    </section>

    <!-- Stage 3: Infinity Counter -->
    <section id="stage-3" class="stage" style="background-image: url('images/stage3.jpg');" data-portrait="images/portrait/stage3.jpg">
        <div class="progress-dots" aria-hidden="true">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
        <div class="stage-content">
            <div class="dialogue-box">
                <h2 class="stage-title-text" id="stage-3-title"></h2>
                <div class="clue-wrapper">
                    <p class="clue-text" id="stage-3-clue"></p>
                </div>
                <div class="input-row">
                    <input type="text" class="stage-input" id="input-3" placeholder="Enter your answer.." autocomplete="off" aria-label="Answer input for stage 3">
                    <button class="btn-check" data-stage="3" aria-label="Check answer">
                        <svg class="checkmark-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button class="clue-toggle clue-toggle-3" aria-label="Toggle clue visibility" aria-expanded="true" data-clue="stage-3-clue">
                <span class="toggle-icon">▼</span>
            </button>
        </div>
    </section>

    <!-- Stage 4: Co-Op Buttons -->
    <section id="stage-4" class="stage stage-4" style="background-image: url('images/stage4.jpg');" data-portrait="images/portrait/stage4.jpg">
        <!-- Progress dots hidden (commented out for future use) -->
        <!-- <div class="progress-dots" aria-hidden="true">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div> -->

        <!-- Dialogue box at the top -->
        <div class="stage-content-top">
            <div class="dialogue-box">
                <h2 class="stage-title-text" id="stage-4-title"></h2>
                <div class="clue-wrapper clue-wrapper-4">
                    <p class="clue-text" id="stage-4-clue"></p>
                </div>
                <button class="clue-toggle clue-toggle-4" aria-label="Toggle clue visibility" aria-expanded="true" data-clue="stage-4-clue">
                    <span class="toggle-icon">▼</span>
                </button>
        </div>

        <!-- Co-op section at the bottom -->
        <div class="coop-section-bottom" id="coop-section-4">
            <p class="coop-prompt">Both players tap together!</p>
            <div class="coop-buttons">
                <!-- Player 1 Column -->
                <div class="coop-player-column">
                    <span class="coop-player-title">Player 1</span>
                    <button class="arcade-btn arcade-btn-p1" data-player="1">
                        <span class="arcade-key">A</span>
                    </button>
                </div>
                <!-- Player 2 Column -->
                <div class="coop-player-column">
                    <span class="coop-player-title">Player 2</span>
                    <button class="arcade-btn arcade-btn-p2" data-player="2">
                        <span class="arcade-key">B</span>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Treasure Screen (transitions from stage 4) -->
    <section id="stage-treasure" class="stage" style="background-image: url('images/treasure.jpg');" data-portrait="images/portrait/treasure.jpg">
        <div class="proposal-content">
            <p class="countdown-number" id="countdown" style="display:none;"></p>
        </div>
    </section>

    <!-- Proposal Screen -->
    <section id="stage-proposal" class="stage" data-portrait="images/portrait/final.jpg">
        <div class="proposal-content">
            <p class="proposal-message" id="proposal-message"></p>
            <div class="proposal-buttons">
                <button class="btn-yes" id="btn-yes">YES!</button>
            </div>
        </div>
        <p class="after-yes" id="after-yes" style="display:none;"></p>
    </section>

    <!-- Global confetti container (body-level for full viewport coverage) -->
    <div id="confetti-container" class="confetti-container" aria-hidden="true"></div>

    <!-- Fade overlay for final transition -->
    <div id="fade-overlay" class="fade-overlay" aria-hidden="true"></div>

    <!-- Error boundary container -->
    <div id="error-boundary" class="error-screen" style="display:none;">
        <p>Oops! Something went wrong. Please refresh to restart the quest.</p>
    </div>

    <script src="js/audio.js"></script>
    <script src="js/confetti.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
